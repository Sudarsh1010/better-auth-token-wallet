name: Publish to npm

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm --filter better-auth-token-wallet build

      - name: Run tests
        run: pnpm test

      - name: Publish to npm
        run: npm publish
        working-directory: packages/token-wallet
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
